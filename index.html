<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Anonymous Project</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: auto;
      padding: 20px;
      line-height: 1.6;
    }

    h1 { text-align: center; }
    h2 { margin-top: 60px; }

    .links {
      text-align: center;
      margin: 20px 0;
    }

    .links a {
      margin: 0 10px;
      padding: 8px 14px;
      border: 1px solid #ccc;
      border-radius: 20px;
      text-decoration: none;
      color: black;
    }

    .pair {
      margin: 50px 0;
    }

    .row {
      display: flex;
      gap: 20px;
    }

    .col {
      flex: 1;
    }

    img {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .label {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .prompt {
      color: #555;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<h1>Anonymous Project Title</h1>

<p style="text-align:center;">
  Anonymous Author · Anonymous Lab · 2026
</p>

<div class="links">
  <a href="#">Paper</a>
  <a href="#">Code</a>
  <a href="#">Project Page</a>
</div>

<h2>Abstract</h2>
<p>
This page presents baseline vs ours comparisons. Each row shows a pair.
</p>

<h2>Baseline vs Ours</h2>

<div id="container"></div>

<script>
const pairs = [
  {
    name: "Pair 1",
    prompt: "A chair inspired by a flower",
    baseline: "images/baseline1.png",
    ours: "images/ours1.png"
  },
  {
    name: "Pair 1",
    prompt: "A chair inspired by a flower",
    baseline: "images/baseline1.png",
    ours: "images/ours1.png"
  },
  {
    name: "Pair 1",
    prompt: "A chair inspired by a flower",
    baseline: "images/baseline1.png",
    ours: "images/ours1.png"
  }
];

const container = document.getElementById("container");

pairs.forEach(p => {
  const div = document.createElement("div");
  div.className = "pair";

  div.innerHTML = `
    <h3>${p.name}</h3>
    <div class="prompt">${p.prompt}</div>

    <div class="row">
      <div class="col">
        <div class="label">Baseline</div>
        <img src="${p.baseline}">
      </div>

      <div class="col">
        <div class="label">Ours</div>
        <img src="${p.ours}">
      </div>
    </div>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
