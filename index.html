<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Project Page</title>
  <style>
    body { font-family: Arial; max-width: 900px; margin: auto; }
    h1 { margin-top: 40px; }
    .pair { margin: 40px 0; }
    .row { display: flex; gap: 20px; }
    img { width: 100%; border: 1px solid #ddd; }
  </style>
</head>

<body>

<h1>Anonymous Project</h1>
<p>Baseline vs Ours comparison</p>

<div id="container"></div>

<script>
const pairs = [
  {
    name: "Pair 1",
    baseline: "images/pic1.png",
    ours: "images/pic2.png"
  },
  {
    name: "Pair 1",
    baseline: "images/pic1.png",
    ours: "images/pic2.png"
  },
  {
    name: "Pair 1",
    baseline: "images/pic1.png",
    ours: "images/pic2.png"
  },
  {
    name: "Pair 1",
    baseline: "images/pic1.png",
    ours: "images/pic2.png"
  }
];

const container = document.getElementById("container");

pairs.forEach(p => {
  const div = document.createElement("div");
  div.className = "pair";

  div.innerHTML = `
    <h3>${p.name}</h3>
    <div class="row">
      <div>
        <p>Baseline</p>
        <img src="${p.baseline}">
      </div>
      <div>
        <p>Ours</p>
        <img src="${p.ours}">
      </div>
    </div>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
